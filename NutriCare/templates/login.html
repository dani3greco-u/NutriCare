{% extends 'base.html' %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <h2>Accedi a NutriCare</h2>
        <p class="subtitle">Inserisci le tue credenziali per continuare</p>

        <form method="POST" class="login-form">
            {% csrf_token %}
            
            <div class="input-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn-login">Accedi</button>
        </form>

        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}
    </div>
</div>

<style>
    .login-page {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        background-color: #f4f7f6;
    }
    .login-card {
        background: white;
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }
    .login-card h2 { margin-bottom: 0.5rem; color: #2c3e50; }
    .subtitle { color: #7f8c8d; margin-bottom: 2rem; font-size: 0.9rem; }
    .input-group input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 1rem;
    }
    .btn-login {
        width: 100%;
        padding: 12px;
        background-color: #27ae60;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }
    .btn-login:hover { background-color: #219150; }
    .error-message {
        margin-top: 15px;
        padding: 10px;
        background-color: #f8d7da;
        color: #721c24;
        border-radius: 4px;
        font-size: 0.85rem;
    }
</style>
{% endblock %}
